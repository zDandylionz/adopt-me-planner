<!DOCTYPE html>
<html>
<head>
  <title>Adopt Me Task Tracker</title>
  <style>
    body { font-family: Arial; text-align:center; padding:20px; }
    button { margin:5px; padding:10px; font-size:16px; }
    .box { margin-top:20px; font-size:20px; }
  </style>
</head>

<body>

<h1>🐾 Adopt Me Task Tracker</h1>

<h2 id="progress">Progress: 0 / 25 tasks</h2>
<h3 id="percent">0%</h3>

<div class="box">
  <button onclick="addTask()">🛁 Bath</button>
  <button onclick="addTask()">🍎 Hunger</button>
  <button onclick="addTask()">💤 Sleep</button>
  <button onclick="addTask()">🎾 Play</button>
  <button onclick="addTask()">🚶 Walk</button>
</div>

<br>

<button onclick="reset()">🔄 Reset</button>

<script>
let done = 0;
let total = 25; // default pet growth estimate

function update() {
  let percent = (done / total) * 100;

  document.getElementById("progress").innerText =
    `Progress: ${done} / ${total} tasks`;

  document.getElementById("percent").innerText =
    percent.toFixed(1) + "%";
}

function addTask() {
  if (done < total) {
    done++;
    update();
  }
}

function reset() {
  done = 0;
  update();
}

update();
</script>

</body>
</html>
