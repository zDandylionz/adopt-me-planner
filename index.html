<!DOCTYPE html>
<html>
<head>
  <title>Adopt Me Task Tracker</title>
  <style>
    body { font-family: Arial; text-align:center; padding:20px; }
    button { margin:5px; padding:10px; font-size:16px; }
  </style>
</head>

<body>

<h1>🐾 Adopt Me Task Tracker</h1>

<h2 id="progress">Progress: 0%</h2>

<button onclick="addProgress(8)">🛁 Bath</button>
<button onclick="addProgress(10)">🍎 Hunger</button>
<button onclick="addProgress(12)">💤 Sleep</button>
<button onclick="addProgress(6)">🎾 Play</button>
<button onclick="addProgress(10)">🚶 Walk</button>

<br><br>

<button onclick="reset()">🔄 Reset</button>

<script>
let progress = 0;

function addProgress(value) {
  progress += value;
  if (progress > 100) progress = 100;

  document.getElementById("progress").innerText =
    "Progress: " + progress.toFixed(1) + "%";
}

function reset() {
  progress = 0;
  document.getElementById("progress").innerText =
    "Progress: 0%";
}
</script>

</body>
</html>
